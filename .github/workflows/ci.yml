name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: apps/frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: apps/frontend
      - name: Test frontend
        run: npm test -- --run
        working-directory: apps/frontend
      - name: Build frontend
        run: npm run build
        working-directory: apps/frontend

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt
          pip install -e .
          pip install \
            pytest==8.3.3 \
            httpx==0.28.1 \
            pip-audit==2.7.3 \
            ruff==0.7.4 \
            mypy==1.13.0 \
            bandit==1.7.10 \
            pre-commit==4.0.1 \
            pytest-cov==6.0.0 \
            dvc==3.58.0 \
            dvc-s3==3.2.0

      - name: Pull DVC data
        id: dvc_pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.DVC_S3_ENDPOINT_URL }}
        run: |
          # Configure prod remote endpoint from secret (falls back gracefully if
          # the secret is not set — CI still runs against locally committed stubs)
          if [ -n "$AWS_S3_ENDPOINT_URL" ]; then
            dvc remote modify prod endpointurl "$AWS_S3_ENDPOINT_URL" --local
          fi
          if dvc pull data/raw data/processed --allow-missing 2>&1; then
            echo "data_available=true" >> "$GITHUB_OUTPUT"
            echo "✅ DVC pull succeeded"
          else
            echo "data_available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  DVC remote not reachable — smoke test will be skipped"
          fi

      - name: Quality gate (pre-commit)
        run: |
          pre-commit run --all-files

      - name: Static type check (mypy)
        run: |
          mypy --ignore-missing-imports \
            src/api.py \
            src/api_v1.py \
            src/api_v2.py \
            src/cli/train.py \
            src/user_store.py \
            scripts/evaluate_rollback.py

      - name: Coverage gate — all tests + module coverage >=80%
        run: |
          python -m pytest -q \
            --cov=src.cost_matrix \
            --cov=src.evaluate \
            --cov=src.monitoring \
            --cov=src.rate_limit \
            --cov=src.train \
            --cov=src.experiment_tracking \
            --cov=src.config \
            --cov=src.utils \
            --cov=src.cli.evaluate \
            --cov=src.cli.train \
            --cov=src.explain \
            --cov=src.hpo \
            --cov=src.api \
            --cov=src.api_shared \
            --cov=src.dashboard \
            --cov=src.dashboard_auth \
            --cov=src.data_validation \
            --cov=src.api_v1 \
            --cov=src.api_v2 \
            --cov=src.tracing \
            --cov=src.cli._helpers \
            --cov=src.features \
            --cov=src.cli.monitor \
            --cov=src.cli.preprocess \
            --cov=src.cli.serve \
            --cov=src.calibration \
            --cov=src.io \
            --cov=src.preprocess \
            --cov=src.predict \
            --cov=src.split \
            --cov=src.validate \
            --cov=src.policy \
            --cov=src.cli.hpo \
            --cov=src.cli.explain \
            --cov=src.cli.predict \
            --cov=src.cli.policy \
            --cov=src.cli.split \
            --cov=src.guests \
            --cov=src.guest_store \
            --cov-report=term \
            --cov-fail-under=80 \
            tests/test_cost_matrix.py \
            tests/test_evaluate.py \
            tests/test_monitoring.py \
            tests/test_rate_limit.py \
            tests/test_rate_limit_extended.py \
            tests/test_train.py \
            tests/test_train_extended.py \
            tests/test_experiment_tracking.py \
            tests/test_experiment_tracking_extended.py \
            tests/test_config.py \
            tests/test_utils.py \
            tests/test_explain.py \
            tests/test_hpo.py \
            tests/test_features.py \
            tests/test_dashboard.py \
            tests/test_dashboard_extended.py \
            tests/test_dashboard_auth_unit.py \
            tests/test_data_validation.py \
            tests/test_data_validation_extended.py \
            tests/test_api.py \
            tests/test_api_extended.py \
            tests/test_api_versions.py \
            tests/test_api_shared_unit.py \
            tests/test_tracing.py \
            tests/test_tracing_extended.py \
            tests/test_chat_memory.py \
            tests/test_chat_pipeline.py \
            tests/test_chat_ollama_client.py \
            tests/test_chat_orchestrator.py \
            tests/test_chat_router.py \
            tests/test_knowledge_store.py \
            tests/test_evaluate_rollback_script.py \
            tests/test_cli_helpers.py \
            tests/test_cli_train.py \
            tests/test_cli_train_extended2.py \
            tests/test_cli_evaluate.py \
            tests/test_cli_evaluate_extended.py \
            tests/test_cli_monitor.py \
            tests/test_cli_monitor_extended.py \
            tests/test_cli_preprocess.py \
            tests/test_cli_preprocess_extended.py \
            tests/test_cli_serve.py \
            tests/test_cli_predict.py \
            tests/test_cli_hpo.py \
            tests/test_cli_explain.py \
            tests/test_cli_policy.py \
            tests/test_policy.py \
            tests/test_schema_validation.py \
            tests/test_calibration.py \
            tests/test_chat.py \
            tests/test_io.py \
            tests/test_policy_extended.py \
            tests/test_predict_full.py \
            tests/test_preprocess.py \
            tests/test_split.py \
            tests/test_validate.py \
            tests/test_guests.py \
            tests/test_knowledge_api.py

      - name: Bandit security scan
        run: |
          bandit -r src/ -ll -x src/web

      - name: Dependency security audit
        run: |
          pip-audit -r requirements-prod.txt

      - name: Integration smoke
        run: |
          python -m pytest -v tests/test_pipeline_smoke.py
        # Veri yoksa test skipif ile atlanır (exit 0) — CI bloklanmaz.
        # Veri varsa gerçek pipeline çalışır.

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ds-project:${{ github.sha }} .

  dvc-e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt -e .
          pip install dvc==3.58.0 dvc-s3==3.2.0 pytest==8.3.3
      - name: Pull DVC data (pipeline inputs)
        id: dvc_pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.DVC_S3_ENDPOINT_URL }}
        run: |
          if [ -n "$AWS_S3_ENDPOINT_URL" ]; then
            dvc remote modify prod endpointurl "$AWS_S3_ENDPOINT_URL" --local
          fi
          if dvc pull data/raw data/processed --allow-missing 2>&1; then
            echo "data_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "data_available=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  DVC remote not reachable — e2e skipped"
            exit 0
          fi
      - name: Run DVC pipeline (preprocess → split → train → evaluate)
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          dvc repro preprocess split train evaluate
      - name: Verify pipeline outputs exist
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          python -c "
          from pathlib import Path
          for p in ['data/processed', 'data/interim', 'models']:
              assert Path(p).exists(), f'Missing pipeline output: {p}'
          print('✅ All pipeline outputs present')
          "
      - name: Run pipeline smoke test
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          python -m pytest -v tests/test_pipeline_smoke.py
