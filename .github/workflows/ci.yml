name: ci

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: "30 2 * * *"

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/frontend/package-lock.json
      - name: Install frontend deps
        run: npm ci
        working-directory: apps/frontend
      - name: Lint frontend
        run: npm run lint
        working-directory: apps/frontend
      - name: Test frontend
        run: npm test -- --run
        working-directory: apps/frontend
      - name: Build frontend
        run: npm run build
        working-directory: apps/frontend

  alembic-drift-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt
          pip install -e .
      - name: Alembic migration drift check (fail-fast)
        run: |
          export DATABASE_URL="sqlite:///${{ github.workspace }}/.ci_alembic_check.db"
          rm -f "${{ github.workspace }}/.ci_alembic_check.db"
          alembic upgrade head
          alembic check

  test:
    needs: alembic-drift-check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
    outputs:
      dvc_data_available: ${{ steps.dvc_pull.outputs.data_available }}
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt
          pip install -e .
          pip install \
            pytest==8.3.3 \
            httpx==0.28.1 \
            pip-audit==2.7.3 \
            ruff==0.7.4 \
            mypy==1.13.0 \
            bandit==1.7.10 \
            pytest-cov==6.0.0 \
            dvc==3.58.0 \
            dvc-s3==3.2.0

      - name: Pull DVC data
        id: dvc_pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.DVC_S3_ENDPOINT_URL }}
        run: |
          # Configure prod remote endpoint from secret (falls back gracefully if
          # the secret is not set - CI still runs against locally committed stubs)
          if [ -n "$AWS_S3_ENDPOINT_URL" ]; then
            dvc remote modify prod endpointurl "$AWS_S3_ENDPOINT_URL" --local
          fi
          if dvc pull data/raw data/processed --allow-missing 2>&1; then
            echo "data_available=true" >> "$GITHUB_OUTPUT"
            echo "DVC pull succeeded"
          else
            echo "data_available=false" >> "$GITHUB_OUTPUT"
            echo "DVC remote not reachable - smoke test will be skipped"
          fi

      - name: DVC data unavailable notice (non-blocking)
        if: steps.dvc_pull.outputs.data_available != 'true'
        run: |
          echo "::warning::DVC data unavailable. Integration smoke is marked as neutral/skipped in this run."
          {
            echo "### DVC Smoke Status"
            echo ""
            echo "- status: skipped (neutral)"
            echo "- reason: DVC data unavailable in CI context"
            echo "- enforcement: nightly `dvc-e2e-nightly` run is mandatory and fails on missing data"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Prepare quality report directory
        run: mkdir -p reports

      - name: Ruff lint (non-fix + SARIF)
        run: |
          ruff check . --output-format sarif > reports/ruff.sarif

      - name: Ruff format check (non-fix)
        run: |
          ruff format --check .

      - name: Static type check (mypy)
        run: |
          mypy --ignore-missing-imports \
            src/api.py \
            src/api_lifespan.py \
            src/api_v1.py \
            src/api_v2.py \
            src/api_shared.py \
            src/calibration.py \
            src/config.py \
            src/cost_matrix.py \
            src/dashboard.py \
            src/dashboard_auth.py \
            src/dashboard_store.py \
            src/db_bootstrap.py \
            src/evaluate.py \
            src/experiment_tracking.py \
            src/features.py \
            src/guest_store.py \
            src/guests.py \
            src/io.py \
            src/metrics.py \
            src/monitoring.py \
            src/policy.py \
            src/predict.py \
            src/preprocess.py \
            src/rate_limit.py \
            src/split.py \
            src/train.py \
            src/tracing.py \
            src/user_store.py \
            src/utils.py \
            src/validate.py \
            src/validation/__init__.py \
            src/validation/anomaly.py \
            src/validation/drift.py \
            src/validation/schema.py \
            src/chat/memory.py \
            src/chat/router.py \
            src/chat/orchestrator.py \
            src/chat/ollama_client.py \
            src/chat/knowledge/db_store.py \
            src/chat/knowledge/store.py \
            src/cli/train.py \
            src/cli/evaluate.py \
            src/cli/monitor.py \
            scripts/evaluate_rollback.py \
            | tee reports/mypy.txt

      - name: API contract snapshot guard (v1/v2)
        run: |
          python -m pytest -q -m contract tests

      - name: Coverage gate - marker-based suite (coverage >=80%)
        run: |
          python -m pytest -q tests \
            -m "not integration and not contract" \
            --cov=src \
            --cov-report=term \
            --cov-report=xml:reports/coverage.xml \
            --cov-report=json:reports/coverage.json \
            --junitxml=reports/junit.xml \
            --cov-fail-under=80 \
            --durations=20

      - name: Bandit security scan
        run: |
          bandit -r src/ -ll -x src/web -f sarif -o reports/bandit.sarif

      - name: Dependency security audit
        run: |
          pip-audit -r requirements-prod.txt -f json -o reports/pip-audit.json

      - name: Integration smoke
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          python -m pytest -q -m integration tests
        # If data is unavailable, smoke is explicitly skipped via job summary warning.

      - name: Upload quality artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports-py${{ matrix.python-version }}
          if-no-files-found: warn
          path: |
            reports/coverage.xml
            reports/coverage.json
            reports/junit.xml
            reports/ruff.sarif
            reports/bandit.sarif
            reports/pip-audit.json
            reports/mypy.txt

  dvc-smoke-status:
    name: dvc-smoke-status
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - name: Upstream test failed
        if: needs.test.result != 'success'
        run: |
          echo "::error::Upstream test job failed; DVC smoke status cannot be evaluated."
          exit 1

      - name: Smoke executed
        if: needs.test.outputs.dvc_data_available == 'true'
        run: |
          echo "DVC data available. Integration smoke executed in test job."
          {
            echo "### DVC Smoke Status"
            echo ""
            echo "- status: executed"
            echo "- data availability: true"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Smoke skipped with warning (neutral)
        if: needs.test.outputs.dvc_data_available != 'true'
        run: |
          echo "::warning::DVC data unavailable. Smoke intentionally skipped (neutral) on PR/push."
          {
            echo "### DVC Smoke Status"
            echo ""
            echo "- status: skipped (neutral)"
            echo "- data availability: false"
            echo "- action: nightly full DVC e2e run enforces hard failure on missing data"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-validate:
    runs-on: ubuntu-latest
    needs: [test, frontend, dvc-smoke-status]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker image build
        run: docker build -t hotel-booking-cancellation-prediction:${{ github.sha }} .

  dvc-e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'schedule'
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt -e .
          pip install dvc==3.58.0 dvc-s3==3.2.0 pytest==8.3.3
      - name: Pull DVC data (pipeline inputs)
        id: dvc_pull
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.DVC_S3_ENDPOINT_URL }}
        run: |
          if [ -n "$AWS_S3_ENDPOINT_URL" ]; then
            dvc remote modify prod endpointurl "$AWS_S3_ENDPOINT_URL" --local
          fi
          if dvc pull data/raw data/processed --allow-missing 2>&1; then
            echo "data_available=true" >> "$GITHUB_OUTPUT"
          else
            echo "data_available=false" >> "$GITHUB_OUTPUT"
            echo "DVC remote not reachable - e2e skipped"
            exit 0
          fi
      - name: Run DVC pipeline (preprocess -> split -> train -> evaluate)
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          dvc repro preprocess split train evaluate
      - name: Verify pipeline outputs exist
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          python -c "
          from pathlib import Path
          for p in ['data/processed', 'data/interim', 'models']:
              assert Path(p).exists(), f'Missing pipeline output: {p}'
          print('All pipeline outputs present')
          "
      - name: Run pipeline smoke test
        if: steps.dvc_pull.outputs.data_available == 'true'
        run: |
          python -m pytest -v tests/test_pipeline_smoke.py

  dvc-e2e-nightly:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule'
    env:
      PYTHONPATH: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-prod.txt -e .
          pip install dvc==3.58.0 dvc-s3==3.2.0 pytest==8.3.3

      - name: Pull DVC data (required on nightly)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.DVC_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.DVC_SECRET_ACCESS_KEY }}
          AWS_S3_ENDPOINT_URL: ${{ secrets.DVC_S3_ENDPOINT_URL }}
        run: |
          if [ -n "$AWS_S3_ENDPOINT_URL" ]; then
            dvc remote modify prod endpointurl "$AWS_S3_ENDPOINT_URL" --local
          fi
          dvc pull data/raw data/processed

      - name: Run full DVC pipeline nightly
        run: |
          dvc repro preprocess split train evaluate

      - name: Verify pipeline outputs exist
        run: |
          python -c "
          from pathlib import Path
          for p in ['data/processed', 'data/interim', 'models']:
              assert Path(p).exists(), f'Missing pipeline output: {p}'
          print('All pipeline outputs present')
          "

      - name: Nightly pipeline smoke test
        run: |
          python -m pytest -v tests/test_pipeline_smoke.py
