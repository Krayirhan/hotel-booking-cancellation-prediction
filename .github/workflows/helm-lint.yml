name: helm-lint

on:
  pull_request:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm lint (base values)
        run: |
          helm lint deploy/helm/hotel-booking-cancellation-prediction \
            --values deploy/helm/hotel-booking-cancellation-prediction/values.yaml

      - name: Helm lint (staging values)
        run: |
          helm lint deploy/helm/hotel-booking-cancellation-prediction \
            --values deploy/helm/hotel-booking-cancellation-prediction/values.yaml \
            --values deploy/helm/hotel-booking-cancellation-prediction/values-staging.yaml

      - name: Helm lint (production values)
        run: |
          helm lint deploy/helm/hotel-booking-cancellation-prediction \
            --values deploy/helm/hotel-booking-cancellation-prediction/values.yaml \
            --values deploy/helm/hotel-booking-cancellation-prediction/values-production.yaml

      - name: Helm template validate
        run: |
          helm template hotel-booking-cancellation-prediction deploy/helm/hotel-booking-cancellation-prediction \
            --values deploy/helm/hotel-booking-cancellation-prediction/values.yaml > /dev/null
          helm template hotel-booking-cancellation-prediction-staging deploy/helm/hotel-booking-cancellation-prediction \
            --values deploy/helm/hotel-booking-cancellation-prediction/values.yaml \
            --values deploy/helm/hotel-booking-cancellation-prediction/values-staging.yaml > /dev/null
          helm template hotel-booking-cancellation-prediction-prod deploy/helm/hotel-booking-cancellation-prediction \
            --values deploy/helm/hotel-booking-cancellation-prediction/values.yaml \
            --values deploy/helm/hotel-booking-cancellation-prediction/values-production.yaml > /dev/null
