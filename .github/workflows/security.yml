name: security

on:
  pull_request:
  push:
    branches: [ "main" ]

jobs:
  scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (apt — no GitHub API dependency)
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y -qq
          sudo apt-get install -y trivy
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            .

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          github-token: ${{ github.token }}
          upload-artifact: false
          upload-release-assets: false

      - name: Upload SBOM artifact
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false

  container-scan:
    runs-on: ubuntu-latest
    needs: scans
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy (apt — no GitHub API dependency)
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" \
            | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update -y -qq
          sudo apt-get install -y trivy
          trivy --version

      - name: Build image for scanning
        run: docker build -t hotel-booking-cancellation-prediction-scan:${{ github.sha }} .

      - name: Trivy container image scan
        run: |
          trivy image \
            --scanners vuln \
            --format sarif \
            --output trivy-container-results.sarif \
            --ignore-unfixed \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            hotel-booking-cancellation-prediction-scan:${{ github.sha }}

      - name: Upload container scan SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-container-results.sarif

