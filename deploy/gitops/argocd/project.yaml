apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hotel-booking-cancellation-prediction
  namespace: argocd
spec:
  description: Hotel Booking Cancellation Prediction ML inference platform
  sourceRepos:
    - "https://github.com/your-org/hotel-booking-cancellation-prediction.git"
  destinations:
    - namespace: hotel-booking-cancellation-prediction
      server: https://kubernetes.default.svc
    - namespace: hotel-booking-cancellation-prediction-staging
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
