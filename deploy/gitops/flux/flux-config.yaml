---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hotel-booking-cancellation-prediction
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/your-org/hotel-booking-cancellation-prediction.git
  ref:
    branch: main
  secretRef:
    name: hotel-booking-cancellation-prediction-git-auth
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hotel-booking-cancellation-prediction-staging
  namespace: hotel-booking-cancellation-prediction-staging
spec:
  interval: 5m
  chart:
    spec:
      chart: deploy/helm/hotel-booking-cancellation-prediction
      sourceRef:
        kind: GitRepository
        name: hotel-booking-cancellation-prediction
        namespace: flux-system
  valuesFiles:
    - deploy/helm/hotel-booking-cancellation-prediction/values.yaml
    - deploy/helm/hotel-booking-cancellation-prediction/values-staging.yaml
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hotel-booking-cancellation-prediction-production
  namespace: hotel-booking-cancellation-prediction
spec:
  interval: 5m
  # Production: requires manual gate via suspend: true until approved
  suspend: true
  chart:
    spec:
      chart: deploy/helm/hotel-booking-cancellation-prediction
      sourceRef:
        kind: GitRepository
        name: hotel-booking-cancellation-prediction
        namespace: flux-system
  valuesFiles:
    - deploy/helm/hotel-booking-cancellation-prediction/values.yaml
    - deploy/helm/hotel-booking-cancellation-prediction/values-production.yaml
  install:
    createNamespace: true
    remediation:
      retries: 5
  upgrade:
    remediation:
      retries: 5
