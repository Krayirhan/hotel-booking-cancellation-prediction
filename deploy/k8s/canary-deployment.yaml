apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking-cancellation-prediction-api-canary
  namespace: hotel-booking-cancellation-prediction
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hotel-booking-cancellation-prediction-api
      track: canary
  template:
    metadata:
      labels:
        app: hotel-booking-cancellation-prediction-api
        track: canary
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/hotel-booking-cancellation-prediction:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DS_ENV
              value: "production"
            - name: REQUIRE_API_KEY
              value: "true"
            - name: DASHBOARD_AUTH_ENABLED
              value: "true"
            - name: DS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DS_API_KEY
            - name: DS_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DS_ADMIN_KEY
            - name: DASHBOARD_ADMIN_PASSWORD_ADMIN
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DASHBOARD_ADMIN_PASSWORD_ADMIN
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: ALERT_WEBHOOK_URL
            - name: LOG_FORMAT
              value: "json"
            - name: RATE_LIMIT_BACKEND
              value: "redis"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: REDIS_URL
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-booking-cancellation-prediction-api-canary
  namespace: hotel-booking-cancellation-prediction
spec:
  selector:
    app: hotel-booking-cancellation-prediction-api
    track: canary
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
