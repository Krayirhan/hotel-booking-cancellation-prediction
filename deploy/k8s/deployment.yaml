apiVersion: apps/v1
kind: Deployment
metadata:
  name: hotel-booking-cancellation-prediction-api
  namespace: hotel-booking-cancellation-prediction
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hotel-booking-cancellation-prediction-api
  template:
    metadata:
      labels:
        app: hotel-booking-cancellation-prediction-api
    spec:
      terminationGracePeriodSeconds: 40
      initContainers:
        - name: alembic-migrate
          image: ghcr.io/your-org/hotel-booking-cancellation-prediction:latest
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DATABASE_URL
      containers:
        - name: api
          image: ghcr.io/your-org/hotel-booking-cancellation-prediction:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: DS_ENV
              value: "production"
            - name: REQUIRE_API_KEY
              value: "true"
            - name: DASHBOARD_AUTH_ENABLED
              value: "true"
            - name: DS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DS_API_KEY
            - name: DS_ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DS_ADMIN_KEY
            - name: DASHBOARD_ADMIN_PASSWORD_ADMIN
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DASHBOARD_ADMIN_PASSWORD_ADMIN
            - name: ALERT_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: ALERT_WEBHOOK_URL
            - name: LOG_FORMAT
              value: "json"
            - name: RATE_LIMIT_BACKEND
              value: "redis"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: REDIS_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: DATABASE_URL
            - name: CORS_ALLOW_ORIGINS
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: CORS_ALLOW_ORIGINS
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: hotel-booking-cancellation-prediction-secrets
                  key: OTEL_EXPORTER_OTLP_ENDPOINT
            - name: OTEL_EXPORTER_OTLP_INSECURE
              value: "false"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hotel-booking-cancellation-prediction-api
  namespace: hotel-booking-cancellation-prediction
spec:
  selector:
    app: hotel-booking-cancellation-prediction-api
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
  type: ClusterIP
