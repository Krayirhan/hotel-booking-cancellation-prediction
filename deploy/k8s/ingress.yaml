apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hotel-booking-cancellation-prediction-api
  namespace: hotel-booking-cancellation-prediction
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - hotel-booking-cancellation-prediction.example.com
      secretName: hotel-booking-cancellation-prediction-api-tls
  rules:
    - host: hotel-booking-cancellation-prediction.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hotel-booking-cancellation-prediction-api
                port:
                  number: 80