apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hotel-booking-cancellation-prediction-api-restrict
  namespace: hotel-booking-cancellation-prediction
spec:
  podSelector:
    matchLabels:
      app: hotel-booking-cancellation-prediction-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 443      # HTTPS (external APIs)
        - protocol: TCP
          port: 6379     # Redis
        - protocol: TCP
          port: 5432     # PostgreSQL
        - protocol: TCP
          port: 11434    # Ollama LLM (chat endpoint)
        - protocol: TCP
          port: 4317     # OTLP gRPC → Jaeger / OTel Collector
        - protocol: UDP
          port: 53       # DNS
