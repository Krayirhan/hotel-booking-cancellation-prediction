apiVersion: v1
kind: Secret
metadata:
  name: hotel-booking-cancellation-prediction-alertmanager-secrets
  namespace: hotel-booking-cancellation-prediction
  annotations:
    hotel-booking-cancellation-prediction.io/managed-by: external-secret
type: Opaque
stringData:
  # Do not commit real values. Inject at deploy time via ExternalSecret/SealedSecret.
  slack_webhook_url: "REPLACE_AT_DEPLOY_TIME"
  pagerduty_routing_key: "REPLACE_AT_DEPLOY_TIME"
---
apiVersion: v1
kind: Secret
metadata:
  name: hotel-booking-cancellation-prediction-alertmanager-config
  namespace: hotel-booking-cancellation-prediction
type: Opaque
stringData:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: default-receiver
      group_by: ["alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 1h
      routes:
        - matchers:
            - severity="critical"
          receiver: pagerduty-critical
        - matchers:
            - severity="warning"
          receiver: slack-warnings

    receivers:
      - name: default-receiver
        webhook_configs:
          - url: "http://alert-router.hotel-booking-cancellation-prediction.svc.cluster.local/default"

      - name: slack-warnings
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/hotel-booking-cancellation-prediction-alertmanager-secrets/slack_webhook_url
            channel: "#ds-alerts"
            title: "[Hotel Booking Cancellation Prediction] {{ .CommonAnnotations.summary }}"
            text: "{{ .CommonAnnotations.description }}"

      - name: pagerduty-critical
        pagerduty_configs:
          - routing_key_file: /etc/alertmanager/secrets/hotel-booking-cancellation-prediction-alertmanager-secrets/pagerduty_routing_key
            description: "{{ .CommonAnnotations.summary }}"
---
apiVersion: monitoring.coreos.com/v1
kind: Alertmanager
metadata:
  name: hotel-booking-cancellation-prediction-alertmanager
  namespace: hotel-booking-cancellation-prediction
spec:
  replicas: 1
  configSecret: hotel-booking-cancellation-prediction-alertmanager-config
  secrets:
    - hotel-booking-cancellation-prediction-alertmanager-secrets
